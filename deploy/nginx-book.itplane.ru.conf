server {
    listen 80;
    server_name book.itplane.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name book.itplane.ru;

    ssl_certificate /etc/letsencrypt/live/book.itplane.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/book.itplane.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://oauth.yandex.ru https://login.yandex.ru https://yastatic.net https://mc.yandex.ru https://mc.yandex.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://oauth.yandex.ru https://login.yandex.ru https://login.yandex.com wss://mc.yandex.ru wss://mc.yandex.com; img-src 'self' data: https://avatars.yandex.net https://mc.yandex.ru https://mc.yandex.com; frame-src https://oauth.yandex.ru; font-src 'self' data:; base-uri 'self'; form-action 'self' https://oauth.yandex.ru;" always;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }
}
